INHERIT: docs/mkdocs-base.yml

site_name: qsmile
site_description: Volatility Smile Modelling
site_url: https://markrichardson.github.io/qsmile/
repo_url: https://github.com/markrichardson/qsmile
repo_name: markrichardson/qsmile

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

use_directory_urls: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path:
        - "."
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - toc:
      permalink: true
      toc_depth: 3

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Marimo Notebooks: notebooks.md
  - Reports: reports.md
  - API Reference: api.md
  - Developer:
      - Contributing: CONTRIBUTING.md
      - Code of Conduct: CODE_OF_CONDUCT.md
